; PlatformIO configuration — ESP32 telemetry node for AWS IoT Core
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    -Wall
    -Wextra
check_tool = cppcheck
check_skip_packages = yes
check_src_filters =
    +<src/>
    +<include/>
check_flags =
    cppcheck: --suppress=*:*ArduinoJson*
